<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div class="container" id="appContainer">
    <h1><i class="fas fa-boxes"></i> Product Manager</h1>

    <!-- FORM -->
    <form class="product-form" id="productForm">
      <div class="form-group">
        <label for="titleInput"><i class="fas fa-tag"></i> Title</label>
        <input type="text" id="titleInput" placeholder="e.g. Wireless Mouse" required>
      </div>
      <div class="form-group">
        <label for="priceInput"><i class="fas fa-dollar-sign"></i> Price</label>
        <input type="number" id="priceInput" placeholder="29.99" step="0.01" required>
      </div>
      <div class="form-group">
        <label for="imageInput"><i class="fas fa-image"></i> Image URL</label>
        <input type="text" id="imageInput" placeholder="https://...">
      </div>
      <div class="form-group">
        <label for="categoryInput"><i class="fas fa-folder"></i> Category</label>
        <input type="text" id="categoryInput" placeholder="Electronics">
      </div>
      <button type="submit" class="btn-add" id="addBtn"><i class="fas fa-plus-circle"></i> Add Product</button>
    </form>

    <!-- TOOLBAR -->
    <div class="toolbar">
      <div class="search-box">
        <i class="fas fa-search"></i>
        <input type="text" id="searchInput" placeholder="Search by title...">
      </div>
      <div class="filter-group">
        <select id="categoryFilter">
          <option value="">All categories</option>
          <!-- dynamic categories will be inserted -->
        </select>
        <button id="sortLowHigh" class="sort-btn"><i class="fas fa-arrow-up"></i> Price ↑</button>
        <button id="sortHighLow" class="sort-btn"><i class="fas fa-arrow-down"></i> Price ↓</button>
        <button id="resetFilters"><i class="fas fa-undo-alt"></i> Reset</button>
      </div>
    </div>

    <!-- PRODUCT GRID -->
    <div id="productGrid" class="product-grid">
      <!-- products rendered by JS -->
    </div>
  </div>

  <script src="./script.js"></script>
</body>
</html>
